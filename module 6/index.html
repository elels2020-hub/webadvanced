<!DOCTYPE html>
<html>
    <head>
        <title> Lesson 6</title>
    </head>
    <body>
        <from>
            <fieldset>
            <label for="firstname"> First Name:</label><br>
            <input type="text" id="firstname" name="firstname"><br>
            <label for="lastname"> Last Name:</label><br>
            <input type="text" id="lastname" name="lastname"><br>
            <label for="email"> Email:</label><br>
            <input type="email" id="email" name="email"><br>
            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password"><br><br>
            <label>Gender:</label>
            <input type="radio" id="male" name="gender">
            <label for="male">Male</label><br>
            <input type="radio" id="female" name="gender">
            <label for="female">Female</label><br><br>
            <label>Hobbies:</label>
            <input type="checkbox" id="gaming" name="Gaming" value="Gaming">
            <label for="gaming"> Gaming</label><br>
             <input type="checkbox" id="football" name="Football" value="Football">
            <label for="football"> Football</label><br>
             <input type="checkbox" id="swimming" name="Swimming" value="Swimming">
            <label for="swimming"> Swimming</label><br><br>
            <label for="pets">Choose a pet:</label>
            <select id="pet" name="pet">
                <option value="Dog">Dog</option>
                <option value="Cat">Cat</option>
                <option value="Parrot">Parrot</option>
            </select><br><br>

            <textarea name="message" row="10" column="20" maxlength="50"></textarea><br><br>

            <input type="submit" id="submit" name="submit">
        </fieldset>

        </from>
    </body>
</html>
